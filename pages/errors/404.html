<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Страница не найдена - Учебный центр</title>
    <link rel="stylesheet" href="/assets/css/style.css">
    <style>
        .error-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: linear-gradient(135deg, #F8FAFE 0%, #FFFFFF 100%);
        }
        .error-content {
            max-width: 600px;
            padding: 2rem;
        }
        .error-code {
            font-size: 8rem;
            font-weight: 700;
            color: #007BFF;
            margin: 0;
            line-height: 1;
        }
        .error-title {
            font-size: 1.5rem;
            color: #1A2B4C;
            margin: 1rem 0;
        }
        .error-text {
            color: #6c757d;
            margin-bottom: 2rem;
        }
        .btn-back {
            display: inline-block;
            background: #007BFF;
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 50px;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="error-page">
        <div class="error-content">
            <h1 class="error-code">404</h1>
            <h2 class="error-title">Страница не найдена</h2>
            <p class="error-text">К сожалению, запрашиваемая страница не существует или была перемещена.</p>
            <a href="/" class="btn-back">Вернуться на главную</a>
        </div>
    </div>
</body>
</html>
